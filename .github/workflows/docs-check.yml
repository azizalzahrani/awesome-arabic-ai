name: Docs Check

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify public markdown links
        run: |
          python .github/scripts/check_markdown_links.py \
            README.md \
            CONTRIBUTING.md \
            CODE_OF_CONDUCT.md \
            .github/ISSUE_TEMPLATE/bug_report.md \
            .github/ISSUE_TEMPLATE/config.yml \
            .github/ISSUE_TEMPLATE/resource_suggestion.md \
            .github/PULL_REQUEST_TEMPLATE.md
